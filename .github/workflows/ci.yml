name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore FlipFlop.sln

      - name: Build
        run: dotnet build FlipFlop.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test FlipFlop.sln --configuration Release --no-build --verbosity normal
